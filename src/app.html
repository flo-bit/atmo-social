<!doctype html>
<html lang="en" class="mauve fuchsia">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(function() {
				var b = localStorage.getItem('baseColor');
				var a = localStorage.getItem('accentColor');
				var cl = document.documentElement.classList;
				if (b) { cl.remove('mauve'); cl.add(JSON.parse(b)); }
				if (a) { cl.remove('fuchsia'); cl.add(JSON.parse(a)); }
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-base-50 dark:bg-base-900 text-base-900 dark:text-base-50">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
